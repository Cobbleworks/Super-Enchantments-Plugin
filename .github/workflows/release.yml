name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog notes
        id: changelog
        run: |
          python3 - <<'PYEOF'
          import re

          version = '${{ steps.version.outputs.VERSION }}'

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
              pattern = rf'(?m)^## \[{re.escape(version)}\].*?\n(.*?)(?=\n^## \[|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              notes = match.group(1).strip() if match else f'Release {version}'
          except FileNotFoundError:
              notes = f'Release {version}'

          with open('release_notes.txt', 'w', encoding='utf-8') as f:
              f.write(notes)
          PYEOF

      - name: Locate JAR artifact
        id: jar
        run: |
          JAR=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          echo "JAR_PATH=$JAR" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$(basename $JAR)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.repository.name }} ${{ github.ref_name }}
          body_path: release_notes.txt
          files: ${{ steps.jar.outputs.JAR_PATH }}
          draft: false
          prerelease: false

